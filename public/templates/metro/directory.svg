<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 600">
  <!-- Backer panel (slightly larger, offset for depth) -->
  <g id="backer">
    <rect x="4" y="4" width="450" height="600" rx="6" fill="#1a1a1a"/>
  </g>
  <!-- Face panel -->
  <g id="face-fill">
    <rect x="0" y="0" width="450" height="600" rx="6" fill="#3a3f47"/>
  </g>
  <!-- Accent bar -->
  <g id="accent-bar">
    <rect x="0" y="0" width="450" height="18" rx="6" fill="#c9a84c"/>
    <rect x="0" y="6" width="450" height="12" fill="#c9a84c"/>
  </g>
  <!-- Title area -->
  <g id="text-primary">
    <text x="225" y="58" text-anchor="middle" dominant-baseline="central" font-size="28" font-family="Montserrat, sans-serif" fill="#e8e0d0" font-weight="700" letter-spacing="6">DIRECTORY</text>
  </g>
  <!-- Thin divider under title -->
  <rect x="40" y="78" width="370" height="1.5" fill="#c9a84c" opacity="0.6"/>
  <!-- Insert panel for directory listings -->
  <g id="insert-background">
    <rect x="30" y="95" width="390" height="420" rx="3" fill="#f5f0e8"/>
  </g>
  <g id="insert-text">
    <!-- Placeholder directory rows -->
    <!-- Row 1 -->
    <text x="55" y="132" font-size="14" font-family="Montserrat, sans-serif" fill="#1a1a1a" font-weight="600">Suite 100</text>
    <text x="395" y="132" text-anchor="end" font-size="14" font-family="Montserrat, sans-serif" fill="#3a3f47" font-weight="400">Management Office</text>
    <line x1="50" y1="142" x2="400" y2="142" stroke="#c9a84c" stroke-width="0.5" opacity="0.4"/>
    <!-- Row 2 -->
