    <rect x="270" y="392" width="130" height="10" rx="2" fill="#d0cbc3" opacity="0.3"/>
    <rect x="50" y="422" width="150" height="10" rx="2" fill="#d0cbc3" opacity="0.4"/>
    <rect x="300" y="422" width="100" height="10" rx="2" fill="#d0cbc3" opacity="0.3"/>
