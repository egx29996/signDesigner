    <text x="395" y="167" text-anchor="end" font-size="14" font-family="Montserrat, sans-serif" fill="#3a3f47" font-weight="400">Architectural Partners</text>
    <line x1="50" y1="177" x2="400" y2="177" stroke="#c9a84c" stroke-width="0.5" opacity="0.4"/>
    <!-- Row 3 -->
    <text x="55" y="202" font-size="14" font-family="Montserrat, sans-serif" fill="#1a1a1a" font-weight="600">Suite 300</text>
    <text x="395" y="202" text-anchor="end" font-size="14" font-family="Montserrat, sans-serif" fill="#3a3f47" font-weight="400">Legal Associates LLC</text>
    <line x1="50" y1="212" x2="400" y2="212" stroke="#c9a84c" stroke-width="0.5" opacity="0.4"/>
    <!-- Row 4 -->
    <text x="55" y="237" font-size="14" font-family="Montserrat, sans-serif" fill="#1a1a1a" font-weight="600">Suite 400</text>
    <text x="395" y="237" text-anchor="end" font-size="14" font-family="Montserrat, sans-serif" fill="#3a3f47" font-weight="400">Capital Financial Group</text>
    <line x1="50" y1="247" x2="400" y2="247" stroke="#c9a84c" stroke-width="0.5" opacity="0.4"/>
    <!-- Row 5 -->
    <text x="55" y="272" font-size="14" font-family="Montserrat, sans-serif" fill="#1a1a1a" font-weight="600">Suite 500</text>
    <text x="395" y="272" text-anchor="end" font-size="14" font-family="Montserrat, sans-serif" fill="#3a3f47" font-weight="400">Healthcare Solutions</text>
    <line x1="50" y1="282" x2="400" y2="282" stroke="#c9a84c" stroke-width="0.5" opacity="0.4"/>
    <!-- Row 6 -->
