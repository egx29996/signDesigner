    <text x="395" y="307" text-anchor="end" font-size="14" font-family="Montserrat, sans-serif" fill="#3a3f47" font-weight="400">Tech Innovations Inc</text>
    <line x1="50" y1="317" x2="400" y2="317" stroke="#c9a84c" stroke-width="0.5" opacity="0.4"/>
